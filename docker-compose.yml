version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: citrus_postgres
    environment:
      POSTGRES_USER: citrus
      POSTGRES_PASSWORD: citrus123
      POSTGRES_DB: citrus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: